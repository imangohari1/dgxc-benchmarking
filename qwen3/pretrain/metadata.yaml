# Setup
general:
  workload: qwen3
  workload_type: pretrain
  framework: megatron_bridge

container:
  images:
    by_gpu:
      default:
        - 'nvcr.io#nvidia/nemo:26.02.01'
      gb300:
        - 'nvcr.io#nvidia/nemo:26.02.00'

downloads:
  huggingface:
    - repo_id: 'Qwen/Qwen3-30B-A3B'
    - repo_id: 'Qwen/Qwen3-235B-A22B'

repositories:
  by_gpu:
    default:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "aeead1ae667d795ebe725cb4a608581a21f402cc"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "525d68bfce2d6baed86ed3d7d0edbae07833ea0d"
    gb300:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "6b3b5ba7ef64182caba23faa8d7abc0125aa3807"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "ab0c4328275c4c731f1bdea3ceb0e68a9a17a6a2"

setup:
  venv_req: true
  dependencies:
    git:
      megatron_bridge:
        repo_key: megatron_bridge
        install_method:
          type: clone
    pip:
      - package: nemo_run
        repo_key: nemo_run


# Run
run:
  launcher_type: 'megatron_bridge'
  launch_script: 'launch.sh'

  gpu_configs:
    gb300:
      model_configs:
        - model_size: '235b'
          dtypes: ['bf16']
          scales: [256,512]
        - model_size: '30b'
          dtypes: ['bf16']
          scales: [8,16,32,64]

    gb200:
      model_configs:
        - model_size: '235b'
          dtypes: ['bf16']
          scales: [256,512]
        - model_size: '30b'
          dtypes: ['bf16']
          scales: [8,16,32,64]

    b300:
      model_configs:
        - model_size: '235b'
          dtypes: ['bf16']
          scales: [256,512]
        - model_size: '30b'
          dtypes: ['bf16']
          scales: [8,16,32,64]

    b200:
      model_configs:
        - model_size: '235b'
          dtypes: ['bf16']
          scales: [256,512]
        - model_size: '30b'
          dtypes: ['bf16']
          scales: [8,16,32,64]

    h100:
      model_configs:
        - model_size: '235b'
          dtypes: ['bf16']
          scales: [256,512]
        - model_size: '30b'
          dtypes: ['bf16']
          scales: [16,32,64]
