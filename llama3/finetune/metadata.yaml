# Setup
general:
  workload: llama3
  workload_type: finetune
  framework: megatron_bridge

container:
  images: 
    - 'nvcr.io#nvidia/nemo:26.02.01'

repositories:
  megatron_bridge:
    url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
    commit: "f07871e23f637f4ae87d92256babc51fdbb12f39"
  nemo_run:
    url: "https://github.com/NVIDIA-NeMo/Run.git"
    commit: "01a9a8ba360f7b2908728ad0516e0ad9d936966d"

setup:
  venv_req: true
  dependencies:
    git:
      megatron_bridge:
        repo_key: megatron_bridge
        install_method:
          type: clone
    pip:
      - package: nemo_run
        repo_key: nemo_run
  tasks:
    - name: checkpoint_dataset_download
      cmd: './download_ckpt_dataset.sh'
      job_type: srun
      requires_gpus: true

  
# Run
run:
  launcher_type: 'megatron_bridge'
  launch_script: 'launch.sh'

  gpu_configs:
    gb300:
      model_configs:
        - model_size: '70b'
          dtypes: ['bf16', 'fp8']
          scales: [8, 16]
          exact_scales: true

    gb200:
      model_configs:
        - model_size: '70b'
          dtypes: ['bf16', 'fp8']
          scales: [8, 16]
          exact_scales: true

    b300:
      model_configs:
        - model_size: '70b'
          dtypes: ['bf16', 'fp8']
          scales: [8, 16]
          exact_scales: true

    b200:
      model_configs:
        - model_size: '70b'
          dtypes: ['bf16', 'fp8']
          scales: [8, 16]
          exact_scales: true

    h100:
      model_configs:
        - model_size: '70b'
          dtypes: ['bf16', 'fp8']
          scales: [8, 16]
          exact_scales: true

