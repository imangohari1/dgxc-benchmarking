# Setup
general:
  workload: kimi-k2
  workload_type: pretrain
  framework: megatron_bridge

container:
  images:
    - 'nvcr.io#nvidia/nemo:26.04.01'

downloads:
  huggingface:
    - repo_id: 'moonshotai/Kimi-K2-Instruct'
      assets: [config]

repositories:
  megatron_bridge:
    url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
    commit: "06f25c227ef9d3d9b22e5561fb9f46e1cbdab7e2"

  nemo_run:
    url: "https://github.com/NVIDIA-NeMo/Run.git"
    commit: "211d4b7439c1b5ee401cfbaba1765454ed438ff5"

setup:
  venv_req: true
  dependencies:
    git:
      megatron_bridge:
        repo_key: megatron_bridge
        install_method:
          type: clone
    pip:
      - package: nemo_run
        repo_key: nemo_run

tools:
  nsys:
    by_gpu:
      gb200: "2025.5.1.121-3638078"
      b300: "2025.5.1.121-3638078"

# Run
run:
  launcher_type: 'megatron_bridge'
  launch_script: 'launch.sh'

  gpu_configs:
    gb300:
      model_configs:
        - model_size: '1t'
          dtypes: ['fp8']
          scales: [512, 256]

    gb200:
      model_configs:
        - model_size: '1t'
          dtypes: ['fp8']
          scales: [512, 256]

    b300:
      model_configs:
        - model_size: '1t'
          dtypes: ['fp8']
          scales: [512, 256]

    b200:
      model_configs:
        - model_size: '1t'
          dtypes: ['fp8']
          scales: [512, 256]
