# Setup
general:
  workload: system_info
  workload_type: microbenchmark
  framework: host-debug

# Host-debug steps run directly on the node; the container image is only used
# for the final srun smoke-test that validates pyxis/enroot + GPU visibility.
container:
  images:
    - 'nvcr.io#nvidia/nemo:26.04.00'

# Run
run:
  launcher_type: 'configured_sbatch'
  launch_script: 'launch.sh'

  gpu_configs:
    gb300:
      model_configs:
        - model_size: '1b'
          dtypes: ['bf16']
          scales: [4]
          exact_scales: true
    gb200:
      model_configs:
        - model_size: '1b'
          dtypes: ['bf16']
          scales: [4]
          exact_scales: true
    b300:
      model_configs:
        - model_size: '1b'
          dtypes: ['bf16']
          scales: [8]
          exact_scales: true
    b200:
      model_configs:
        - model_size: '1b'
          dtypes: ['bf16']
          scales: [8]
          exact_scales: true
    h100:
      model_configs:
        - model_size: '1b'
          dtypes: ['bf16']
          scales: [8]
          exact_scales: true
