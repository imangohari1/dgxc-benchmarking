# Setup
general:
  workload: deepseek-v3
  display_name: deepseek-v3-rl
  workload_type: rl
  framework: nemo-rl

container:
  images: 
    - 'nvcr.io#nvidia/nemo-rl:v0.6.0'

repositories:
  nemo-rl:
    url: "https://github.com/NVIDIA/NeMo-RL.git"
    commit: "5fb588932bf835506a8a5bac01de4f8c7ab0a065"
    submodules: true
  deepseek-v3:
    url: "https://github.com/deepseek-ai/DeepSeek-V3.git"
    commit: "9b4e9788e4a3a731f7567338ed15d3ec549ce03b"

downloads:
  huggingface:
    repos:
      - repo_id: deepseek-ai/DeepSeek-V3
        repo_type: model
        name: DeepSeek-V3-FP8

setup:
  venv_req: true
  dependencies:
    git:
      nemo-rl:
        repo_key: nemo-rl
        install_method:
          type: clone
      deepseek-v3:
        repo_key: deepseek-v3
        install_method:
          type: clone
    pip:
      - 'matplotlib==3.10.9'
  tasks:
    - name: checkpoint_conversion
      cmd: './download_checkpoint.sh'
      job_type: sbatch
      requires_gpus: true

run:
  launcher_type: 'configured_sbatch'
  launch_script: 'launch.sh'

  gpu_configs:
    gb200:
      model_configs:
        - model_size: '671b'
          dtypes:
            bf16: [256]
