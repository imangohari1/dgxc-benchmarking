# Setup
general:
  workload: deepseek-v3
  workload_type: pretrain
  framework: megatron_bridge

container:
  images:
    by_gpu:
      default:
        - 'nvcr.io#nvidia/nemo:26.04.00'
      b300:
        - 'nvcr.io#nvidia/nemo:26.02.01'
      b200:
        - 'nvcr.io#nvidia/nemo:26.02.01'
      h100:
        - 'nvcr.io#nvidia/nemo:25.09.00'

downloads:
  huggingface:
    - repo_id: 'deepseek-ai/DeepSeek-V3'
      assets: [config]

repositories:
  by_gpu:
    default:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "fab68031197b64934027e188c0cb417fdf1e1d7a"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "64b91e0187b93475ea0d54028317e349ced7ac1b"
    b300:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "f07871e23f637f4ae87d92256babc51fdbb12f39"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "525d68bfce2d6baed86ed3d7d0edbae07833ea0d"
    b200:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "f07871e23f637f4ae87d92256babc51fdbb12f39"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "525d68bfce2d6baed86ed3d7d0edbae07833ea0d"
    h100:
      megatron_bridge:
        url: "https://github.com/NVIDIA-NeMo/Megatron-Bridge.git"
        commit: "70b50c2a172fb299ef9e3b0811c9d21e6f080149"
      megatron_core:
        url: "https://github.com/NVIDIA/Megatron-LM.git"
        commit: "20d73fe76eb03672c02f637e9b47e562b9010d4c"
      nemo_run:
        url: "https://github.com/NVIDIA-NeMo/Run.git"
        commit: "04f900a9c1cde79ce6beca6a175b4c62b99d7982"

setup:
  by_gpu:
    default:
      venv_req: true
      dependencies:
        git:
          megatron_bridge:
            repo_key: megatron_bridge
            install_method:
              type: clone
        pip:
          - package: nemo_run
            repo_key: nemo_run
    h100:
      venv_req: true
      dependencies:
        pip:
          - package: megatron_bridge
            repo_key: megatron_bridge
            install_target: '.'
          - package: megatron_core
            repo_key: megatron_core
          - package: nemo_run
            repo_key: nemo_run

tools:
  nsys:
    by_gpu:
      gb300: "2025.5.1.121-3638078"
      gb200: "2025.5.1.121-3638078"
      b300: "2025.5.1.121-3638078"
      b200: "2025.5.1.121-3638078"

# Run
run:
  launcher_type: 'megatron_bridge'
  launch_script: 'launch.sh'

  gpu_configs:
    gb300:
      model_configs:
        - model_size: '671b'
          dtypes: ['bf16', 'fp8', 'nvfp4']
          scales: [128, 256, 512]
          proxy_scales: [64]

    gb200:
      model_configs:
        - model_size: '671b'
          dtypes: ['bf16', 'fp8', 'nvfp4']
          scales: [256, 512]
          proxy_scales: [64]

    b300:
      model_configs:
        - model_size: '671b'
          dtypes: ['bf16']
          scales: [128, 256, 512]

    b200:
      model_configs:
        - model_size: '671b'
          dtypes: ['bf16', 'fp8']
          scales: [256, 512]

    h100:
      model_configs:
        - model_size: '671b'
          dtypes:
            bf16: [1024]
            fp8: [512, 1024]

